# Engine configuration (relative to eva/ directory)
RULES_DIR=../rules
DATASOURCE_DEFINITION_FILE=./datasources.properties
ACTION_DEFINITION_FILE=./actions.properties

# Fallback Postgres connection for results/baselines
PG_HOST=localhost
PG_PORT=5432
PG_DBNAME=anbudb
PG_USER=anbuuser
PG_PASS=anbupass
PG_DSN=

# Result DB pool (used only for anbu_result inserts + baseline reads)
RESULT_PG_POOL_MIN=2
RESULT_PG_POOL_MAX=20
RESULT_PG_POOL_CONNECT_TIMEOUT_SEC=10
RESULT_PG_POOL_ACQUIRE_TIMEOUT_SEC=30
